name: twstats
type: laravel
docroot: public
php_version: "8.5"
webserver_type: nginx-fpm
nodejs_version: "22"
database:
  type: mariadb
  version: "11.4"
xdebug_enabled: false
use_dns_when_possible: true
timezone: "Europe/Berlin"
webimage_extra_packages: ["cron"]

hooks:
  post-start:
    # Run the Laravel scheduler every minute via in-container cron.
    # `tee` (not `tee -a`) so restarts don't accumulate duplicate cron entries.
    - exec: echo '* * * * * /usr/bin/php /var/www/html/artisan schedule:run >> /dev/null 2>&1' | sudo tee /etc/cron.d/laravel-cron
    - exec: sudo chmod 0600 /etc/cron.d/laravel-cron && sudo crontab /etc/cron.d/laravel-cron && sudo service cron start
